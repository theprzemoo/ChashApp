name: Build and Publish

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore .\src\ChashApp\ChashApp.csproj

      - name: Build
        run: dotnet build .\src\ChashApp\ChashApp.csproj -c Release --no-restore

      - name: Test
        run: dotnet test .\tests\ChashApp.Tests\ChashApp.Tests.csproj -c Release --no-restore --logger "trx;LogFileName=test-results.trx"

      - name: Publish win-x64
        run: dotnet publish .\src\ChashApp\ChashApp.csproj -c Release -r win-x64 --self-contained true -p:PublishReadyToRun=true -o .\artifacts\publish\win-x64

      - name: Create release zip
        run: Compress-Archive -Path .\artifacts\publish\win-x64\* -DestinationPath .\artifacts\publish\ChashApp-win-x64.zip -Force
        shell: powershell

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChashApp-win-x64
          path: .\artifacts\publish\win-x64

      - name: Upload packaged zip
        uses: actions/upload-artifact@v4
        with:
          name: ChashApp-win-x64-zip
          path: .\artifacts\publish\ChashApp-win-x64.zip
